<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="80" height="200" fill="#0f172a"/>
  <circle cx="40" cy="20" r="8" fill="#3b82f6"/>
  <g font-family="Arial" font-size="8" fill="#94a3b8">
    <text x="14" y="50">📊 Panel</text>
    <text x="14" y="70">📦 Ürünler</text>
