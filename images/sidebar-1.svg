  <rect x="92" y="42" width="100" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="200" y="42" width="100" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="92" y="115" width="208" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="200" y="180" font-family="Arial" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">Sidebar Layout</text>
