<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1628"/>

  <!-- Atmospheric gold radial -->
  <ellipse cx="980" cy="80" rx="600" ry="350" fill="url(#radial)" opacity="0.45"/>
  <ellipse cx="200" cy="600" rx="400" ry="250" fill="url(#radial2)" opacity="0.25"/>

  <!-- Grid pattern -->
  <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo mark -->
  <rect x="100" y="120" width="100" height="100" rx="20" fill="url(#g)"/>
  <text x="150" y="195" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="64" font-weight="700"
        fill="#0a1628">C</text>

  <!-- Wordmark -->
  <text x="220" y="195"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="62" font-weight="600"
        letter-spacing="6"
        fill="#ffffff">CO<tspan fill="#d4a574">DE</tspan>GA</text>

  <!-- Eyebrow -->
  <text x="100" y="320"
        font-family="Inter, sans-serif"
        font-size="20" font-weight="600"
        letter-spacing="6"
        fill="#d4a574">PREMIUM HOSTING · WEB SOLUTIONS</text>

  <!-- Headline -->
  <text x="100" y="400"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="72" font-weight="500"
        fill="#ffffff">İşinizin omurgasını kuran</text>
  <text x="100" y="475"
        font-family="Cormorant Garamond, Georgia, serif"
        font-style="italic"
        font-size="72" font-weight="500"
        fill="#d4a574">premium altyapı.</text>

  <!-- URL -->
  <text x="100" y="560"
        font-family="JetBrains Mono, monospace"
        font-size="22" font-weight="500"
        fill="rgba(255,255,255,0.6)">→ codega.com.tr</text>

  <defs>
    <linearGradient id="g" x1="100" y1="120" x2="200" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8c896"/>
      <stop offset="1" stop-color="#b8895a"/>
    </linearGradient>
    <radialGradient id="radial" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d4a574"/>
      <stop offset="1" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="radial2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d4a574"/>
      <stop offset="1" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
